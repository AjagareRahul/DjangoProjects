<!DOCTYPE html>
<html>
<head>
    <title>Update Recipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% if messages %}
<div class="container mt-3">
{% for message in messages %}
<div class="alert alert-success">{{ message }}</div>
{% endfor %}
</div>
{% endif %}

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4">Update Recipe</h2>

        <form method="POST" action="{% url 'update' rec.id %}" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Recipe Name</label>
                <input type="text" name="name" class="form-control" value="{{ rec.name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" required>{{ rec.description }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Recipe Image</label>
                {% if rec.image %}
                <img src="{{ rec.image.url }}" class="mb-2" style="max-height: 100px;">
                {% endif %}
                <input type="file" name="image" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">Update Recipe</button>
            <a href="{% url 'recipe_detail' rec.id %}" class="btn btn-secondary">Cancel</a>

        </form>
    </div>
</div>

</body>
</html>
