<!DOCTYPE html>
<html>
<head>
    <title>Recipe Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow">
        <div class="row g-0">
            <div class="col-md-4">
                {% if rec.image %}
                <img src="{{ rec.image.url }}" class="img-fluid rounded-start" alt="{{ rec.name }}" style="height: 100%; object-fit: cover;">
                {% else %}
                <div class="bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 300px;">No Image</div>
                {% endif %}
            </div>
            <div class="col-md-8">
                <div class="card-body">
                    <h2 class="card-title">{{ rec.name }}</h2>
                    <hr>
                    <p class="card-text">{{ rec.description }}</p>
                    <a href="{% url 'home' %}" class="btn btn-primary">Back to All Recipes</a>
                    <a href="{% url 'update' rec.id %}" class="btn btn-success">Edit Recipe</a>
                    <a href="{% url 'delete' rec.id %}" class="btn btn-danger" onclick="return confirm('Are you sure?')">Delete Recipe</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
