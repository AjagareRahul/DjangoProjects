{% extends 'base.html' %}
{% block content %}
{% load static %}
{% if profiledata %}
{% for i in profiledata %}
<div class="card" style="width: 18rem;">
  <img src="{{i.img.url}}" class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">{{i.name}}</h5>
    <a href="{{i.resume.url}}" class="btn btn-primary">Download Resume</a>
  </div>
</div>
{% endfor %}
{% else %}
<p>No profile data available.</p>
{% endif %}

{% endblock %}
