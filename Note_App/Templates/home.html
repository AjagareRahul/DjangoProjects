<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <a href="{% url 'Form' %}">Add Note</a>
    <h1>All Notes</h1>
    {% for note in notes %}
        <div>
            <h2>{{ note.title }}</h2>
            <p>{{ note.content }}</p>
            <small>Created: {{ note.created_on }}</small>
        </div>
    {% endfor %}
</body>
</html>
